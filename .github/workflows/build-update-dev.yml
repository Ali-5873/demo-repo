name: Build Image and Update Dev State

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-update-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          path: app

      - name: Set image tag
        id: vars
        shell: bash
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./app
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./app
        run: |
          pytest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/ali-5873/demo-repo:${{ steps.vars.outputs.tag }}
            ghcr.io/ali-5873/demo-repo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout State repo
        uses: actions/checkout@v4
        with:
          repository: Ali-5873/k8s-state
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: state

      - name: Update dev image tag in State repo
        shell: bash
        run: |
          cd state

          sed -i "s/tag: .*/tag: ${{ steps.vars.outputs.tag }}/" environments/dev/values.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add environments/dev/values.yaml
          git commit -m "Update dev image to ${{ steps.vars.outputs.tag }}" || echo "No changes to commit"
          git push